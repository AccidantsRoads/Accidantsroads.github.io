<!DOCTYPE html>
<html>
<head>
    <title>عرض ملفات GeoJSON على خريطة Leaflet</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script>
// إنشاء الخريطة وتحديد الموقع الافتراضي
var map = L.map('map').setView([31.9, 35.2], 13);

// إضافة طبقة البلاط (الخلفية)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

// دالة لتحميل ملفات GeoJSON من GitHub
function loadGeoJSON(url) {
    fetch(url)
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data).addTo(map);
        })
        .catch(error => console.error('Error loading the GeoJSON file:', error));
}

// تحميل ملفات GeoJSON من GitHub
loadGeoJSON('https://raw.githubusercontent.com/username/repository/main/Accidants.geojson');
loadGeoJSON('https://raw.githubusercontent.com/username/repository/main/Ramallah.geojson');
loadGeoJSON('https://raw.githubusercontent.com/username/repository/main/Roads.geojson');
</script>

</body>
</html>
